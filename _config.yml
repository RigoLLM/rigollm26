title: RigoLLM 2026
tagline: Symposium on Rigorous LLM Systems
description: >-
  RigoLLM 2026 — Symposium on Rigorous LLM Systems, a full-day workshop
  co-located with USENIX ATC 2026 in Hong Kong. Advancing principled
  approaches to building LLM systems with explicit correctness guarantees.

# Headline facts (shown in the hero, footer, and contact box)
workshop:
  full_name: Symposium on Rigorous LLM Systems
  short_name: RigoLLM
  date: "November 15, 2026"
  venue: "Hyatt Hotel, Shatin, Hong Kong"
  format: "Full-day, hybrid"
  colocated_with: "USENIX ATC 2026"
  atc_url: "https://sigops.org/s/conferences/atc/2026/index.html"
  colocation_dates: "Nov 15–18, 2026"
  contact_name: "Cheng Tan"
  contact_affiliation: "Northeastern University"
  contact_email: "c.tan@northeastern.edu"

# ── Jekyll build settings ──
markdown: kramdown
# Served as a GitHub Pages project site at https://rigollm.github.io/rigollm26/
baseurl: "/rigollm26"
url: "https://rigollm.github.io"

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor
  - ideas.md
  - memory.md
  - TODOs.md
